<!DOCTYPE html>
<html>

<head>

<title>Policy Monitoring Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI;
background:#f4f6f9;
margin:0;
}

/* NAVBAR */

.navbar{
background:white;
padding:18px 50px;
display:flex;
justify-content:space-between;
border-bottom:1px solid #ddd;
}

.logo{
font-size:20px;
font-weight:bold;
color:#2b6ef2;
}

.nav a{
margin-left:20px;
text-decoration:none;
color:#444;
}

/* CONTAINER */

.container{
padding:40px 60px;
}

/* CARDS */

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:25px;
border-radius:8px;
flex:1;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.card h4{
margin:0;
color:#666;
}

.card p{
font-size:28px;
margin-top:10px;
font-weight:bold;
}

/* TABLE */

table{
width:100%;
background:white;
border-collapse:collapse;
margin-top:30px;
}

th,td{
padding:14px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#f7f7f7;
}

/* BAR CHART */

.barChart{
background:white;
padding:20px;
border-radius:10px;
margin-top:40px;
height:350px;
}

/* PIE CHARTS */

.charts{
display:flex;
gap:30px;
margin-top:40px;
}

.chartbox{
background:white;
padding:20px;
border-radius:10px;
flex:1;
height:360px;
}

canvas{
max-height:280px;
}

.changed{
color:red;
font-weight:600;
}

.same{
color:green;
font-weight:600;
}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">Policy Monitor AI</div>

<div class="nav">
<a href="/">Home</a>
<a href="/monitor">Check Policy Updates</a>
</div>

</div>

<div class="container">

<!-- STAT CARDS -->

<div class="cards">

<div class="card">
<h4>Total Policies</h4>
<p id="total">0</p>
</div>

<div class="card">
<h4>Policies Changed</h4>
<p id="changed">0</p>
</div>

<div class="card">
<h4>Policies Unchanged</h4>
<p id="unchanged">0</p>
</div>

</div>

<!-- TABLE -->

<table>

<thead>
<tr>
<th>Policy ID</th>
<th>Policy Name</th>
<th>Company</th>
<th>Status</th>
</tr>
</thead>

<tbody id="policyTable">
</tbody>

</table>


<!-- BAR CHART -->

<div class="barChart">
<h3>Policy Changes by Company</h3>
<canvas id="barChart"></canvas>
</div>


<!-- PIE CHARTS -->

<div class="charts">

<div class="chartbox">
<h3>Company Policy Changes</h3>
<canvas id="companyPie"></canvas>
</div>

<div class="chartbox">
<h3>Changed vs Unchanged</h3>
<canvas id="statusPie"></canvas>
</div>

</div>

</div>


<script>

let companyChart
let statusChart
let barChart

async function loadData(){

const response = await fetch("/api/policies")
const data = await response.json()

let table=document.getElementById("policyTable")
table.innerHTML=""

let changed=0
let unchanged=0
let companyChanges={}

data.forEach(p=>{

if(p.status=="Changed"){
changed++

if(companyChanges[p.company]){
companyChanges[p.company]++
}else{
companyChanges[p.company]=1
}

}else{
unchanged++
}

let cls=p.status=="Changed"?"changed":"same"

let row=`
<tr>
<td>${p.id}</td>
<td>${p.policy_name}</td>
<td>${p.company}</td>
<td class="${cls}">${p.status}</td>
</tr>
`

table.innerHTML+=row

})

document.getElementById("total").innerText=data.length
document.getElementById("changed").innerText=changed
document.getElementById("unchanged").innerText=unchanged

createCompanyPie(companyChanges)
createStatusPie(changed,unchanged)
createBarChart(companyChanges)

}


/* PIE CHART 1 */

function createCompanyPie(companyData){

const labels=Object.keys(companyData)
const values=Object.values(companyData)

const ctx=document.getElementById("companyPie")

if(companyChart){
companyChart.destroy()
}

companyChart=new Chart(ctx,{
type:'pie',
data:{
labels:labels,
datasets:[{
data:values,
backgroundColor:[
"#2b6ef2",
"#ff6384",
"#ff9f40",
"#36a2eb",
"#4bc0c0"
]
}]
}
})

}


/* PIE CHART 2 */

function createStatusPie(changed,unchanged){

const ctx=document.getElementById("statusPie")

if(statusChart){
statusChart.destroy()
}

statusChart=new Chart(ctx,{
type:'pie',
data:{
labels:["Changed","Unchanged"],
datasets:[{
data:[changed,unchanged],
backgroundColor:["#ff4d4d","#2ecc71"]
}]
}
})

}


/* BAR CHART */

function createBarChart(companyData){

const labels=Object.keys(companyData)
const values=Object.values(companyData)

const ctx=document.getElementById("barChart")

if(barChart){
barChart.destroy()
}

barChart=new Chart(ctx,{
type:'bar',
data:{
labels:labels,
datasets:[{
label:"Policy Changes",
data:values,
backgroundColor:"#2b6ef2"
}]
},
options:{
responsive:true
}
})

}


/* REAL TIME DASHBOARD */

setInterval(loadData,5000)

window.onload=loadData

</script>

</body>

</html>
